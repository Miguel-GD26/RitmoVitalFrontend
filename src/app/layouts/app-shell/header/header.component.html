<header class="main-header">

  <!-- Izquierda: toggles + brand -->
  <div class="header-left-group">
    <button class="mobile-toggle" (click)="toggleMobileSidebar()" aria-label="Abrir menú">
      <i class="fas fa-bars"></i>
    </button>

    <button class="desktop-toggle"
            (click)="toggleDesktopSidebar()"
            [attr.aria-label]="isCollapsed() ? 'Expandir menú' : 'Contraer menú'">
      <i class="fas"
         [class.fa-chevron-left]="!isCollapsed()"
         [class.fa-chevron-right]="isCollapsed()"></i>
    </button>

    <div class="brand-identity">
      <i class="fa-solid fa-heart-pulse brand-icon"></i>
      <span class="brand-name">RitmoVital</span>
    </div>
  </div>

  <!-- Derecha: perfil de usuario -->
  <div class="header-actions">

    <div class="user-profile"
         (click)="toggleProfileDropdown($event)"
         [class.active]="isProfileDropdownOpen()">

      <div class="user-avatar">
        @if (userAvatar()) {
          <img [src]="userAvatar()!" alt="Avatar" class="avatar-img">
        } @else {
          {{ userInitials() }}
        }
      </div>

      <div class="user-details">
        <span class="user-name">{{ userName() }}</span>
        <span class="user-role">{{ userRole() }}</span>
      </div>

      @if (isProfileDropdownOpen()) {
        <div class="profile-dropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar">
              @if (userAvatar()) {
                <img [src]="userAvatar()!" alt="Avatar" class="avatar-img">
              } @else {
                {{ userInitials() }}
              }
            </div>
            <h4>{{ userName() }}</h4>
            <p>{{ userRole() }}</p>
          </div>
          <ul class="dropdown-menu-list">
            <li>
              <button type="button" class="dropdown-item" (click)="openProfile($event)">
                <i class="fas fa-user-edit"></i>
                <span>Mi Perfil</span>
              </button>
            </li>
            <li><div class="dropdown-divider"></div></li>
            <li>
              <button type="button" class="dropdown-item logout" (click)="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Cerrar Sesión</span>
              </button>
            </li>
          </ul>
        </div>
      }
    </div>

  </div>
</header>

@if (showProfileModal()) {
  <app-profile-modal (closed)="onProfileClosed()"></app-profile-modal>
}
